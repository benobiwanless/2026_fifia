<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>World Cup 2026 Tournament Hub</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Teko:wght@600;700&family=Barlow+Condensed:wght@500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --cyan:#22e7ff;--cyan2:#9bf3ff;--blue:#117da8;
  --gold:#f7c84a;--gold2:#ffe48b;--white:#f5f8fc;--muted:#c8d5e1;
}
*{box-sizing:border-box}
html,body{
  width:100%;height:100%;margin:0;overflow:hidden;background:#02060c;
  font-family:"Barlow Condensed",Arial,sans-serif;color:#fff;
}
.screen{
  position:relative;width:100vw;height:100vh;overflow:hidden;
  background:
    radial-gradient(circle at 50% 8%,rgba(40,125,255,.18),transparent 15%),
    radial-gradient(circle at 12% 28%,rgba(0,110,255,.09),transparent 18%),
    radial-gradient(circle at 88% 28%,rgba(0,110,255,.09),transparent 18%),
    linear-gradient(180deg,#020914 0%,#071522 56%,#0b1817 100%);
}
.screen:before{
  content:"";position:absolute;inset:0;pointer-events:none;
  background:
    radial-gradient(circle at 8% 18%,rgba(70,170,255,.75) 0 1px,transparent 2px),
    radial-gradient(circle at 20% 24%,rgba(70,170,255,.4) 0 1px,transparent 2px),
    radial-gradient(circle at 34% 16%,rgba(70,170,255,.5) 0 1px,transparent 2px),
    radial-gradient(circle at 61% 22%,rgba(70,170,255,.42) 0 1px,transparent 2px),
    radial-gradient(circle at 78% 17%,rgba(70,170,255,.5) 0 1px,transparent 2px),
    radial-gradient(circle at 92% 20%,rgba(70,170,255,.75) 0 1px,transparent 2px);
}
.screen:after{
  content:"";position:absolute;left:0;right:0;bottom:0;height:14vh;pointer-events:none;
  background:
    radial-gradient(circle at 50% 118%,rgba(41,114,46,.34) 0,rgba(41,114,46,.16) 22%,transparent 31%),
    radial-gradient(circle at 50% 160%,transparent 39.6%,rgba(255,255,255,.24) 40.2%,rgba(255,255,255,.24) 40.7%,transparent 41.25%);
}
.scan{position:absolute;inset:0;opacity:.14;pointer-events:none;background:repeating-linear-gradient(180deg,rgba(255,255,255,.018) 0,rgba(255,255,255,.018) 1px,transparent 2px,transparent 4px)}
.lights{
  position:absolute;top:2vh;width:108px;height:76px;z-index:1;
  display:grid;grid-template-columns:repeat(4,1fr);gap:7px;
  filter:drop-shadow(0 0 8px rgba(255,255,255,.95)) drop-shadow(0 0 20px rgba(90,160,255,.72));
}
.lights.left{left:2vw;transform:rotate(-24deg)}
.lights.right{right:2vw;transform:rotate(24deg)}
.lights span{width:15px;height:15px;border-radius:50%;background:#fff;box-shadow:0 0 8px rgba(255,255,255,.95)}

.header{
  position:absolute;z-index:10;left:0;right:0;top:0;height:13.5vh;
  display:flex;flex-direction:column;align-items:center;padding-top:.35vh;text-align:center;
}
.kicker{color:var(--gold);font-size:min(1.18vw,2.05vh);letter-spacing:.16em;font-weight:800}
h1{
  margin:0;font-family:Teko,Impact,sans-serif;font-size:min(5.05vw,9.15vh);line-height:.86;
  letter-spacing:.04em;text-transform:uppercase;
  background:linear-gradient(#fff,#becbd6);-webkit-background-clip:text;-webkit-text-fill-color:transparent;
}
.subtitle{color:var(--cyan);font-size:min(1.28vw,2.2vh);font-weight:800}
.live{
  display:flex;align-items:center;gap:.5em;margin-top:.28vh;padding:.35vh .8vw;
  border:2px solid #ff3030;border-radius:12px;background:#190608;color:#fff;
  font-size:min(1.05vw,1.82vh);font-weight:800;
}
.live i{width:.7em;height:.7em;border-radius:50%;background:red;box-shadow:0 0 8px red;animation:blink 1.1s ease-in-out infinite}
@keyframes blink{50%{opacity:.3}}

.main{
  position:absolute;z-index:5;left:1.8vw;right:1.8vw;top:14.2vh;bottom:1.7vh;
  display:grid;grid-template-columns:2.65fr 1.05fr;gap:.9vw;
}
.left-panel,.right-panel{
  min-width:0;min-height:0;
}
.left-panel{
  min-width:0;min-height:0;
  display:grid;
  grid-template-rows:auto 1fr auto;
  gap:.55vh;
}
.section-head{
  display:flex;align-items:end;justify-content:space-between;gap:1vw;
}
.section-title{
  font-family:Teko,Impact,sans-serif;
  font-size:min(2.45vw,4.25vh);
  line-height:.9;
  color:#fff;
}
.section-sub{
  color:var(--cyan);
  font-size:min(1.05vw,1.82vh);
  font-weight:800;
}
.all-groups-grid{
  min-width:0;min-height:0;
  display:grid;
  grid-template-columns:repeat(3,minmax(0,1fr));
  grid-template-rows:repeat(4,minmax(0,1fr));
  gap:.55vh .55vw;
}
.compact-group{
  min-width:0;min-height:0;overflow:hidden;
  border:1.5px solid var(--blue);
  border-radius:10px;
  background:linear-gradient(180deg,rgba(12,43,66,.97),rgba(5,18,30,.99));
  box-shadow:inset 0 0 0 1px rgba(34,231,255,.12);
}
.compact-head{
  height:20%;
  min-height:21px;
  display:grid;
  grid-template-columns:minmax(0,1fr) 9% 9% 10% 28%;
  align-items:center;
  gap:.15vw;
  padding:0 .45vw;
  color:var(--cyan);
  background:linear-gradient(180deg,#103653,#09263a);
  font-size:min(.83vw,1.42vh);
  font-weight:800;
}
.compact-head .group-name{
  color:#fff;
  font-size:min(1.02vw,1.76vh);
}
.compact-rows{
  height:80%;
  display:grid;
  grid-template-rows:repeat(4,minmax(0,1fr));
  gap:1.8%;
  padding:.35vh .4vw .45vh;
}
.compact-row{
  min-height:0;
  display:grid;
  grid-template-columns:minmax(0,1fr) 9% 9% 10% 28%;
  align-items:center;
  gap:.15vw;
  border:1px solid rgba(180,200,215,.16);
  border-radius:5px;
  background:rgba(5,21,35,.92);
  color:#fff;
  padding:0 .15vw;
}
.compact-row.top{
  border-color:rgba(247,200,74,.82);
  background:linear-gradient(90deg,rgba(112,83,9,.92),rgba(44,34,10,.72));
}
.compact-team{
  min-width:0;
  display:flex;
  align-items:center;
  gap:.28vw;
  overflow:hidden;
}
.compact-team .flag{
  width:1.18vw;
  min-width:15px;
  max-width:20px;
}
.compact-team-name{
  min-width:0;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
  font-size:min(.84vw,1.44vh);
  font-weight:700;
}
.compact-num{
  text-align:center;
  font-size:min(.82vw,1.4vh);
  font-weight:700;
}
.compact-pts{
  text-align:center;
  font-size:min(.92vw,1.56vh);
  font-weight:800;
}
.compact-row.top .compact-pts{
  color:var(--gold2);
}
.compact-form{
  display:flex;
  align-items:center;
  justify-content:flex-start;
  gap:.12vw;
}
.compact-form .form-dot{
  width:.68vw;
  min-width:10px;
  max-width:13px;
  font-size:min(.42vw,.72vh);
  border-width:1.5px;
}
.form-legend{
  display:grid;
  grid-template-columns:auto 1fr;
  align-items:center;
  gap:.8vw;
  border:1px solid rgba(34,231,255,.22);
  border-radius:10px;
  background:rgba(5,17,28,.88);
  padding:.45vh .65vw;
}
.legend-title{
  color:#fff;
  font-size:min(1vw,1.72vh);
  font-weight:800;
}
.legend-items{
  display:flex;
  align-items:center;
  justify-content:flex-start;
  gap:1vw;
}
.legend-items div{
  display:flex;
  align-items:center;
  gap:.28vw;
  color:var(--muted);
  font-size:min(.86vw,1.46vh);
  font-weight:700;
}
.legend-dot{
  width:.9vw;
  min-width:13px;
  max-width:16px;
  aspect-ratio:1;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  color:#fff;
  font-size:min(.58vw,1vh);
  font-weight:900;
  border:2px solid rgba(255,255,255,.45);
}
.legend-dot.W{background:#24a65a;border-color:#5de18b}
.legend-dot.D{background:#7b8190;border-color:#aeb4c1}
.legend-dot.L{background:#d93434;border-color:#ff7777}
.legend-dot.empty{background:transparent}

.right-panel{
  display:grid;grid-template-rows:1fr 1fr;gap:.9vh;
}
.panel{
  min-width:0;min-height:0;overflow:hidden;border:1.7px solid var(--blue);border-radius:15px;
  background:linear-gradient(180deg,rgba(9,31,48,.97),rgba(5,17,28,.99));
  box-shadow:inset 0 0 0 1px rgba(34,231,255,.12);
}
.panel-head{padding:.85vh .8vw .4vh}
.panel-title{font-family:Teko,Impact,sans-serif;font-size:min(2.55vw,4.4vh);line-height:.9;color:#fff}
.panel-sub{color:var(--cyan);font-size:min(1.08vw,1.85vh);font-weight:800}
.schedule-list{
  height:calc(100% - 5.5vh);padding:0 .7vw .7vh;display:grid;grid-template-rows:repeat(4,minmax(0,1fr));gap:.5vh;
}
.match-card{
  min-height:0;overflow:hidden;border:1px solid rgba(34,231,255,.2);border-radius:10px;
  background:linear-gradient(180deg,rgba(13,43,65,.92),rgba(6,21,34,.96));
  padding:.5vh .6vw;display:grid;grid-template-rows:auto 1fr auto;
}
.match-top{display:flex;justify-content:space-between}
.date{color:var(--gold);font-size:min(1.25vw,2.12vh);font-weight:800}
.time{color:#fff;font-size:min(1.15vw,1.98vh);font-weight:800}
.side{display:flex;align-items:center;gap:.35vw;min-width:0;color:#fff;font-size:min(1.18vw,2.02vh);font-weight:700}
.side+.side{margin-top:.1vh}
.mini{width:1.35vw;min-width:17px;max-width:24px;aspect-ratio:1.45/1;border-radius:2px;overflow:hidden;flex:0 0 auto}
.mini img{width:100%;height:100%;object-fit:cover}
.tname{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.meta{display:flex;justify-content:space-between;gap:.4vw;color:var(--cyan2);font-size:min(.92vw,1.55vh);font-weight:700}
.venue{min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--muted)}
.no-games{height:100%;display:flex;align-items:center;justify-content:center;text-align:center;color:var(--muted);font-size:min(1.5vw,2.55vh);font-weight:800;padding:1vw}

.leaders-header{
  display:flex;align-items:center;justify-content:space-between;padding:.75vh .8vw .2vh;
}
.leader-nav{
  width:2.05vw;min-width:30px;aspect-ratio:1;border-radius:50%;
  border:none;background:rgba(255,255,255,.08);color:#fff;font-size:min(1.4vw,2.38vh);cursor:pointer;
}
.leader-tabs{
  display:grid;grid-template-columns:repeat(4,1fr);gap:.25vw;padding:0 .65vw .45vh;
  border-bottom:1px solid rgba(255,255,255,.12);
}
.tab{
  position:relative;text-align:center;padding:.45vh .2vw;color:var(--muted);
  font-size:min(1.02vw,1.72vh);font-weight:700;cursor:pointer;
}
.tab.active{color:#fff}
.tab.active:after{
  content:"";position:absolute;left:0;right:0;bottom:-.45vh;height:2px;background:#2d7dff;
}
.leader-cols{
  display:grid;grid-template-columns:minmax(0,1fr) 18%;padding:.45vh .85vw .25vh;
  color:var(--muted);font-size:min(.92vw,1.55vh);border-bottom:1px solid rgba(255,255,255,.1);
}
.leader-cols span:last-child{text-align:center}
.leader-list{padding:0 .8vw}
.leader-item{
  display:grid;grid-template-columns:8% 13% minmax(0,1fr) 15%;
  align-items:center;gap:.35vw;padding:.65vh 0;border-bottom:1px solid rgba(255,255,255,.08);
}
.leader-item:last-child{border-bottom:none}
.lrank{text-align:center;color:#fff;font-size:min(.95vw,1.62vh)}
.avatar{
  width:2.65vw;min-width:35px;max-width:46px;aspect-ratio:1;border-radius:50%;
  display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#2d3d55,#0c1520);
  border:2px solid rgba(255,255,255,.2);font-size:min(.95vw,1.62vh);font-weight:800;
}
.lname{min-width:0;display:flex;flex-direction:column;line-height:1.02}
.lname strong{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-size:min(1.18vw,2.02vh)}
.lname span{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--cyan2);font-size:min(.92vw,1.55vh)}
.lval{text-align:center;font-size:min(1.25vw,2.12vh);font-weight:800}

@media(max-aspect-ratio:16/9){.screen{height:calc(100vw*9/16)}}
</style>
</head>
<body>
<div class="screen">
  <div class="scan"></div>

  <div class="lights left">
    <span></span><span></span><span></span><span></span>
    <span></span><span></span><span></span><span></span>
    <span></span><span></span><span></span><span></span>
  </div>
  <div class="lights right">
    <span></span><span></span><span></span><span></span>
    <span></span><span></span><span></span><span></span>
    <span></span><span></span><span></span><span></span>
  </div>

  <header class="header">
    <div class="kicker">TOURNAMENT HUB</div>
    <h1>WORLD CUP 2026</h1>
    <div class="subtitle">All Groups • Today’s Matches • Stat Leaders</div>
    <div class="live"><i></i>LIVE UPDATES</div>
  </header>

  <div class="main">
    <section class="left-panel">
      <div class="section-head">
        <div>
          <div class="section-title">ALL GROUP STANDINGS</div>
          <div class="section-sub">Groups A–L shown together</div>
        </div>
      </div>

      <div id="allGroupsGrid" class="all-groups-grid"></div>

      <div class="form-legend">
        <div class="legend-title">Last 5 matches</div>
        <div class="legend-items">
          <div><span class="legend-dot W">✓</span><span>Win</span></div>
          <div><span class="legend-dot D">−</span><span>Draw</span></div>
          <div><span class="legend-dot L">×</span><span>Loss</span></div>
          <div><span class="legend-dot empty"></span><span>Not played</span></div>
        </div>
      </div>
    </section>

    <aside class="right-panel">
      <section class="panel">
        <div class="panel-head">
          <div class="panel-title">TODAY'S MATCHES</div>
          <div class="panel-sub">Eastern Time only</div>
        </div>
        <div id="scheduleList" class="schedule-list"></div>
      </section>

      <section class="panel">
        <div class="leaders-header">
          <div>
            <div class="panel-title">STAT LEADERS</div>
            <div class="panel-sub">Tournament leaders</div>
          </div>
          <button id="leaderNext" class="leader-nav">›</button>
        </div>
        <div id="leaderTabs" class="leader-tabs"></div>
        <div class="leader-cols"><span>Player</span><span id="leaderValueLabel">Goals</span></div>
        <div id="leaderList" class="leader-list"></div>
      </section>
    </aside>
  </div>
</div>

<script>
const leaderDefs=[
  {key:"goals",label:"Goals"},
  {key:"assists",label:"Assists"},
  {key:"yellowCards",label:"Yellow cards"},
  {key:"redCards",label:"Red cards"}
];
let appData=null;
function compactFormHtml(form){
  const values=(form||[]).slice(-5);
  const padded=[...values];
  while(padded.length<5)padded.push("");
  return padded.map(v=>`<span class="form-dot ${v||"empty"}">${v||""}</span>`).join("");
}

function renderAllGroups(){
  const grid=document.getElementById("allGroupsGrid");
  grid.innerHTML="";

  Object.entries(appData.groups).forEach(([letter,teams])=>{
    const list=sortedTeams(teams);
    const card=document.createElement("section");
    card.className="compact-group";
    card.innerHTML=`
      <div class="compact-head">
        <span class="group-name">GROUP ${letter}</span>
        <span>MP</span>
        <span>GD</span>
        <span>PTS</span>
        <span>LAST 5</span>
      </div>
      <div class="compact-rows">
        ${list.map((t,i)=>`
          <div class="compact-row ${i<2?"top":""}">
            <div class="compact-team">
              <span class="flag"><img src="${flagUrl(t.flag)}" alt=""></span>
              <span class="compact-team-name">${t.team}</span>
            </div>
            <span class="compact-num">${t.p}</span>
            <span class="compact-num">${t.gf-t.ga}</span>
            <span class="compact-pts">${t.pts}</span>
            <span class="compact-form">${compactFormHtml(t.form)}</span>
          </div>
        `).join("")}
      </div>`;
    grid.appendChild(card);
  });
}

function renderSchedule(){
  const list=document.getElementById("scheduleList");
  list.innerHTML="";
  const today=easternDateKey(new Date());
  const games=(appData.games||[]).filter(g=>easternDateKey(new Date(g.kickoff))===today).slice(0,4);

  if(!games.length){
    list.innerHTML='<div class="no-games">NO GAMES SCHEDULED TODAY</div>';
    return;
  }
  games.forEach(g=>{
    const dt=new Date(g.kickoff);
    const date=dt.toLocaleDateString("en-US",{timeZone:"America/New_York",weekday:"short",month:"short",day:"numeric"});
    const time=dt.toLocaleTimeString("en-US",{timeZone:"America/New_York",hour:"numeric",minute:"2-digit",timeZoneName:"short"});
    const card=document.createElement("article");
    card.className="match-card";
    card.innerHTML=`
      <div class="match-top"><span class="date">${date}</span><span class="time">${time}</span></div>
      <div>
        <div class="side"><span class="mini"><img src="${flagUrl(g.homeFlag)}"></span><span class="tname">${g.home}</span></div>
        <div class="side"><span class="mini"><img src="${flagUrl(g.awayFlag)}"></span><span class="tname">${g.away}</span></div>
      </div>
      <div class="meta"><span>Group ${g.group||"-"}</span><span class="venue">${g.venue||""}</span></div>`;
    list.appendChild(card);
  });
}
function initials(name){
  return (name||"?").split(/\s+/).map(x=>x[0]).join("").slice(0,2).toUpperCase();
}
function renderLeaderTabs(){
  const tabs=document.getElementById("leaderTabs");
  tabs.innerHTML="";
  leaderDefs.forEach((d,i)=>{
    const tab=document.createElement("div");
    tab.className="tab"+(i===leaderIndex?" active":"");
    tab.textContent=d.label;
    tab.onclick=()=>{leaderIndex=i;renderLeaders();restartLeaderTimer()};
    tabs.appendChild(tab);
  });
}
function renderLeaders(){
  renderLeaderTabs();
  const def=leaderDefs[leaderIndex];
  document.getElementById("leaderValueLabel").textContent=def.label;
  const items=(appData.leaders?.[def.key]||[]).slice(0,3);
  const fallback=[{name:"Stats updating",team:"FIFA",value:"--"}];
  const list=document.getElementById("leaderList");
  list.innerHTML="";
  (items.length?items:fallback).forEach((item,i)=>{
    const row=document.createElement("div");
    row.className="leader-item";
    row.innerHTML=`
      <div class="lrank">${i+1}</div>
      <div class="avatar">${initials(item.name)}</div>
      <div class="lname"><strong>${item.name}</strong><span>${item.team||"FIFA"}</span></div>
      <div class="lval">${item.value??"--"}</div>`;
    list.appendChild(row);
  });
}
function nextLeader(){
  leaderIndex=(leaderIndex+1)%leaderDefs.length;
  renderLeaders();
}
function restartLeaderTimer(){
  clearInterval(leaderTimer);
  leaderTimer=setInterval(nextLeader,7000);
}
function render(data){
  appData=data;
  leaderIndex=0;
  renderAllGroups();
  renderSchedule();
  renderLeaders();
  restartLeaderTimer();
}
document.getElementById("leaderNext").onclick=()=>{nextLeader();restartLeaderTimer()};

async function load(){
  try{
    const r=await fetch(`data.json?t=${Date.now()}`,{cache:"no-store"});
    if(!r.ok)throw new Error(r.status);
    render(await r.json());
  }catch(e){
    console.error(e);
  }
}
load();
setInterval(load,60000);
</script>
</body>
</html>
