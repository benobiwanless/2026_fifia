<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>World Cup 2026 Tournament Hub</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Teko:wght@600;700&family=Barlow+Condensed:wght@500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --cyan:#22e7ff;
  --cyan2:#9bf3ff;
  --blue:#117da8;
  --gold:#f7c84a;
  --gold2:#ffe48b;
  --white:#f5f8fc;
  --muted:#c8d5e1;
}
*{box-sizing:border-box}
html,body{
  width:100%;height:100%;margin:0;overflow:hidden;
  background:#02060c;
  font-family:"Barlow Condensed",Arial,sans-serif;
}
.screen{
  position:relative;width:100vw;height:100vh;overflow:hidden;
  background:
    radial-gradient(circle at 50% 8%,rgba(40,125,255,.18),transparent 15%),
    radial-gradient(circle at 12% 28%,rgba(0,110,255,.09),transparent 18%),
    radial-gradient(circle at 88% 28%,rgba(0,110,255,.09),transparent 18%),
    linear-gradient(180deg,#020914 0%,#071522 56%,#0b1817 100%);
}
.screen:before{
  content:"";position:absolute;inset:0;pointer-events:none;
  background:
    radial-gradient(circle at 8% 18%,rgba(70,170,255,.75) 0 1px,transparent 2px),
    radial-gradient(circle at 20% 24%,rgba(70,170,255,.4) 0 1px,transparent 2px),
    radial-gradient(circle at 34% 16%,rgba(70,170,255,.5) 0 1px,transparent 2px),
    radial-gradient(circle at 48% 21%,rgba(70,170,255,.35) 0 1px,transparent 2px),
    radial-gradient(circle at 61% 22%,rgba(70,170,255,.42) 0 1px,transparent 2px),
    radial-gradient(circle at 78% 17%,rgba(70,170,255,.5) 0 1px,transparent 2px),
    radial-gradient(circle at 92% 20%,rgba(70,170,255,.75) 0 1px,transparent 2px),
    linear-gradient(180deg,transparent 77%,rgba(25,84,35,.14) 100%);
}
.screen:after{
  content:"";position:absolute;left:0;right:0;bottom:0;height:16vh;pointer-events:none;
  background:
    radial-gradient(circle at 50% 118%,rgba(41,114,46,.36) 0,rgba(41,114,46,.17) 22%,transparent 31%),
    radial-gradient(circle at 50% 160%,transparent 39.6%,rgba(255,255,255,.28) 40.2%,rgba(255,255,255,.28) 40.7%,transparent 41.25%);
}
.scan{
  position:absolute;inset:0;pointer-events:none;opacity:.18;mix-blend-mode:soft-light;
  background:repeating-linear-gradient(180deg,rgba(255,255,255,.02) 0px,rgba(255,255,255,.02) 1px,transparent 2px,transparent 4px);
}
.vignette{
  position:absolute;inset:0;pointer-events:none;
  background:radial-gradient(circle at center,transparent 58%,rgba(0,0,0,.24) 100%);
}
.lights{
  position:absolute;top:2.3vh;width:108px;height:76px;z-index:2;
  display:grid;grid-template-columns:repeat(4,1fr);gap:7px;
  filter:drop-shadow(0 0 8px rgba(255,255,255,.95)) drop-shadow(0 0 20px rgba(90,160,255,.72));
}
.lights.left{left:2vw;transform:rotate(-24deg)}
.lights.right{right:2vw;transform:rotate(24deg)}
.lights span{width:15px;height:15px;border-radius:50%;background:#fff;box-shadow:0 0 8px rgba(255,255,255,.95)}
.hud{position:absolute;inset:0;z-index:2;pointer-events:none}
.hud .gold-left,.hud .gold-right{position:absolute;top:1.1vh;width:11vw;height:7vh}
.hud .gold-left{left:13vw;border-top:4px solid var(--gold);border-left:4px solid var(--gold);transform:skewX(-40deg)}
.hud .gold-right{right:13vw;border-top:4px solid var(--gold);border-right:4px solid var(--gold);transform:skewX(40deg)}
.hud .cyan-left,.hud .cyan-right{
  position:absolute;top:7.4vh;width:11.5vw;height:2px;
  background:linear-gradient(90deg,transparent,var(--cyan) 56%,rgba(34,231,255,.16) 100%);
}
.hud .cyan-left{left:12.4vw}
.hud .cyan-right{right:12.4vw;transform:scaleX(-1)}
.header{
  position:absolute;z-index:4;left:0;right:0;top:0;height:14.5vh;
  text-align:center;padding-top:.7vh;
}
.kicker{
  color:var(--gold);font-size:min(1vw,1.8vh);letter-spacing:.16em;font-weight:800
}
h1{
  margin:0;
  font-family:Teko,Impact,sans-serif;
  font-size:min(4.7vw,8.7vh);
  line-height:.88;
  letter-spacing:.04em;
  text-transform:uppercase;
  background:linear-gradient(#fff,#becbd6);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  text-shadow:0 3px 0 rgba(0,0,0,.82);
}
.subtitle{
  color:var(--cyan);
  font-size:min(1.15vw,2vh);
  font-weight:800;
}
.live{
  position:absolute;right:2.4vw;top:4.2vh;display:flex;align-items:center;gap:.45em;
  padding:.38vh .8vw;border:2px solid #ff3030;border-radius:11px;background:#190608;color:#fff;
  font-size:min(.9vw,1.55vh);font-weight:800;z-index:4;
}
.live i{
  width:.68em;height:.68em;border-radius:50%;background:red;
  box-shadow:0 0 8px red;animation:blink 1.1s ease-in-out infinite;
}
@keyframes blink{50%{opacity:.3}}
.groups{
  position:absolute;z-index:4;left:2vw;right:2vw;top:14.8vh;height:49.8vh;
  display:grid;grid-template-columns:repeat(4,minmax(0,1fr));grid-template-rows:repeat(3,minmax(0,1fr));gap:.8vh .68vw;
}
.group{
  min-width:0;min-height:0;overflow:hidden;border:1.6px solid var(--blue);border-radius:11px;
  background:linear-gradient(180deg,rgba(12,43,66,.97),rgba(5,18,30,.99));
  box-shadow:inset 0 0 0 1px rgba(34,231,255,.14),0 0 10px rgba(34,231,255,.05);
}
.ghead{
  height:21%;min-height:23px;display:flex;align-items:center;justify-content:space-between;padding:0 4%;
  background:linear-gradient(180deg,#103653,#09263a);color:var(--cyan);font-weight:800;
  font-size:min(1vw,1.8vh);
}
.rows{
  height:79%;display:grid;grid-template-rows:repeat(4,minmax(0,1fr));gap:2.2%;padding:.8% 2.1% 2%;
}
.row{
  min-height:0;display:grid;grid-template-columns:10% minmax(0,1fr) repeat(3,8%) 10%;
  align-items:center;border:1px solid rgba(180,200,215,.2);border-radius:6px;
  background:rgba(5,21,35,.92);color:#fff;overflow:hidden;
}
.row.top{
  border-color:rgba(247,200,74,.85);
  background:linear-gradient(90deg,rgba(112,83,9,.95),rgba(44,34,10,.76));
}
.rank,.num,.pts{text-align:center;font-size:min(.84vw,1.5vh);font-weight:700}
.pts{font-size:min(1vw,1.8vh);font-weight:800}
.top .rank,.top .pts{color:var(--gold2)}
.team{
  min-width:0;display:flex;align-items:center;gap:.35vw;padding:0 .2vw;overflow:hidden
}
.flag{flex:0 0 auto;width:1.45vw;min-width:17px;max-width:24px;aspect-ratio:1.45/1;border-radius:2px;overflow:hidden;border:1px solid rgba(255,255,255,.16)}
.flag img{width:100%;height:100%;object-fit:cover;display:block}
.name{
  min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  font-size:min(.86vw,1.52vh);font-weight:600
}
.schedule{
  position:absolute;z-index:4;left:2vw;right:2vw;bottom:1.7vh;height:33.2vh;
  border:1.6px solid var(--blue);border-radius:15px;
  background:linear-gradient(180deg,rgba(9,31,48,.97),rgba(5,17,28,.99));
  box-shadow:inset 0 0 0 1px rgba(34,231,255,.12),0 0 12px rgba(34,231,255,.05);
  padding:.85vh .8vw;
}
.shead{
  height:5vh;display:flex;justify-content:space-between;align-items:center;padding:0 .2vw;gap:1vw
}
.stitle{
  font-family:Teko,Impact,sans-serif;color:#fff;font-size:min(2.35vw,4.1vh);line-height:.92
}
.ssub{color:var(--cyan);font-size:min(.95vw,1.65vh);font-weight:800}
.status{color:var(--muted);font-size:min(.82vw,1.4vh);text-align:right}
.games{
  height:calc(100% - 5vh);display:grid;grid-template-columns:repeat(4,minmax(0,1fr));grid-template-rows:repeat(2,minmax(0,1fr));
  gap:.7vh .58vw
}
.game{
  min-width:0;min-height:0;overflow:hidden;border:1px solid rgba(34,231,255,.2);border-radius:10px;
  background:linear-gradient(180deg,rgba(13,43,65,.92),rgba(6,21,34,.96));
  padding:.62vh .62vw;display:grid;grid-template-rows:auto 1fr auto
}
.gtop{display:flex;justify-content:space-between;gap:.4vw}
.date{color:var(--gold);font-size:min(.82vw,1.45vh);font-weight:800}
.time{color:#fff;font-size:min(.96vw,1.68vh);font-weight:800}
.match{align-self:center;min-width:0}
.side{display:flex;align-items:center;gap:.34vw;min-width:0;font-size:min(.97vw,1.66vh);font-weight:700}
.side+.side{margin-top:.16vh}
.mini{width:1.12vw;min-width:14px;max-width:19px;aspect-ratio:1.45/1;overflow:hidden;border-radius:2px;flex:0 0 auto}
.mini img{width:100%;height:100%;object-fit:cover}
.tname{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.meta{display:flex;justify-content:space-between;gap:.4vw;color:var(--cyan2);font-size:min(.78vw,1.34vh);font-weight:700}
.venue{min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--muted)}
@media(max-aspect-ratio:16/9){.screen{height:calc(100vw*9/16)}}
</style>
</head>
<body>
<div class="screen">
<div class="scan"></div>
<div class="vignette"></div>

<div class="lights left">
  <span></span><span></span><span></span><span></span>
  <span></span><span></span><span></span><span></span>
  <span></span><span></span><span></span><span></span>
</div>
<div class="lights right">
  <span></span><span></span><span></span><span></span>
  <span></span><span></span><span></span><span></span>
  <span></span><span></span><span></span><span></span>
</div>

<div class="hud">
  <div class="gold-left"></div>
  <div class="gold-right"></div>
  <div class="cyan-left"></div>
  <div class="cyan-right"></div>
</div>

<header class="header">
  <div class="kicker">TOURNAMENT HUB</div>
  <h1>WORLD CUP 2026</h1>
  <div class="subtitle">Group Standings + Upcoming Matches • Eastern Time</div>
</header>

<div class="live"><i></i>LIVE UPDATES</div>

<main id="groups" class="groups"></main>

<section class="schedule">
  <div class="shead">
    <div>
      <div class="stitle">NEXT MATCHES</div>
      <div class="ssub">Eastern Time automatically applied</div>
    </div>
    <div id="status" class="status">Loading official FIFA data…</div>
  </div>
  <div id="games" class="games"></div>
</section>
</div>

<script>
function flagUrl(code){
  const special={
    eng:"https://upload.wikimedia.org/wikipedia/en/b/be/Flag_of_England.svg",
    sct:"https://upload.wikimedia.org/wikipedia/commons/1/10/Flag_of_Scotland.svg"
  };
  return special[code] || `https://flagcdn.com/w40/${code}.png`;
}
function sortedTeams(ts){
  return [...ts].sort((a,b)=>b.pts-a.pts||((b.gf-b.ga)-(a.gf-a.ga))||b.gf-a.gf||a.team.localeCompare(b.team));
}
function render(data){
  const groups=document.getElementById("groups");
  groups.innerHTML="";
  Object.entries(data.groups).forEach(([letter,teams])=>{
    const list=sortedTeams(teams);
    const el=document.createElement("section");
    el.className="group";
    el.innerHTML=`<div class="ghead"><span>GROUP ${letter}</span><span>PTS</span></div><div class="rows">${
      list.map((t,i)=>`<div class="row ${i<2?"top":""}">
      <div class="rank">${i+1}</div>
      <div class="team"><span class="flag"><img src="${flagUrl(t.flag)}" alt=""></span><span class="name">${t.team}</span></div>
      <div class="num">${t.p}</div>
      <div class="num">${t.w}</div>
      <div class="num">${t.d}</div>
      <div class="pts">${t.pts}</div></div>`).join("")
    }</div>`;
    groups.appendChild(el);
  });

  const games=document.getElementById("games");
  games.innerHTML="";
  data.games.slice(0,8).forEach(g=>{
    const dt=new Date(g.kickoff);
    const date=dt.toLocaleDateString("en-US",{timeZone:"America/New_York",weekday:"short",month:"short",day:"numeric"});
    const time=dt.toLocaleTimeString("en-US",{timeZone:"America/New_York",hour:"numeric",minute:"2-digit",timeZoneName:"short"});
    const el=document.createElement("article");
    el.className="game";
    el.innerHTML=`<div class="gtop"><span class="date">${date}</span><span class="time">${time}</span></div>
    <div class="match">
      <div class="side"><span class="mini"><img src="${flagUrl(g.homeFlag)}"></span><span class="tname">${g.home}</span></div>
      <div class="side"><span class="mini"><img src="${flagUrl(g.awayFlag)}"></span><span class="tname">${g.away}</span></div>
    </div>
    <div class="meta"><span>Group ${g.group}</span><span class="venue">${g.venue}</span></div>`;
    games.appendChild(el);
  });

  document.getElementById("status").innerHTML=`Source: ${data.source}<br>Updated: ${new Date(data.updated).toLocaleString()}`;
}
async function load(){
  try{
    const r=await fetch(`data.json?t=${Date.now()}`,{cache:"no-store"});
    if(!r.ok) throw new Error(r.status);
    render(await r.json());
  }catch(e){
    document.getElementById("status").textContent="Unable to load data.json";
  }
}
load();
setInterval(load,60000);
</script>
</body>
</html>
