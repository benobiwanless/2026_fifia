<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>World Cup 2026 Tournament Hub</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Teko:wght@600;700&family=Barlow+Condensed:wght@500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --cyan:#22e7ff;--cyan2:#9bf3ff;--blue:#117da8;
  --gold:#f7c84a;--gold2:#ffe48b;--white:#f5f8fc;--muted:#c8d5e1;
}
*{box-sizing:border-box}
html,body{
  width:100%;height:100%;margin:0;overflow:hidden;background:#02060c;
  font-family:"Barlow Condensed",Arial,sans-serif;color:#fff;
}
.screen{
  position:relative;width:100vw;height:100vh;overflow:hidden;
  background:
    radial-gradient(circle at 50% 8%,rgba(40,125,255,.18),transparent 15%),
    radial-gradient(circle at 12% 28%,rgba(0,110,255,.09),transparent 18%),
    radial-gradient(circle at 88% 28%,rgba(0,110,255,.09),transparent 18%),
    linear-gradient(180deg,#020914 0%,#071522 56%,#0b1817 100%);
}
.screen:before{
  content:"";position:absolute;inset:0;pointer-events:none;
  background:
    radial-gradient(circle at 8% 18%,rgba(70,170,255,.75) 0 1px,transparent 2px),
    radial-gradient(circle at 20% 24%,rgba(70,170,255,.4) 0 1px,transparent 2px),
    radial-gradient(circle at 34% 16%,rgba(70,170,255,.5) 0 1px,transparent 2px),
    radial-gradient(circle at 61% 22%,rgba(70,170,255,.42) 0 1px,transparent 2px),
    radial-gradient(circle at 78% 17%,rgba(70,170,255,.5) 0 1px,transparent 2px),
    radial-gradient(circle at 92% 20%,rgba(70,170,255,.75) 0 1px,transparent 2px);
}
.screen:after{
  content:"";position:absolute;left:0;right:0;bottom:0;height:14vh;pointer-events:none;
  background:
    radial-gradient(circle at 50% 118%,rgba(41,114,46,.34) 0,rgba(41,114,46,.16) 22%,transparent 31%),
    radial-gradient(circle at 50% 160%,transparent 39.6%,rgba(255,255,255,.24) 40.2%,rgba(255,255,255,.24) 40.7%,transparent 41.25%);
}
.scan{position:absolute;inset:0;opacity:.14;pointer-events:none;background:repeating-linear-gradient(180deg,rgba(255,255,255,.018) 0,rgba(255,255,255,.018) 1px,transparent 2px,transparent 4px)}
.lights{
  position:absolute;top:2vh;width:108px;height:76px;z-index:1;
  display:grid;grid-template-columns:repeat(4,1fr);gap:7px;
  filter:drop-shadow(0 0 8px rgba(255,255,255,.95)) drop-shadow(0 0 20px rgba(90,160,255,.72));
}
.lights.left{left:2vw;transform:rotate(-24deg)}
.lights.right{right:2vw;transform:rotate(24deg)}
.lights span{width:15px;height:15px;border-radius:50%;background:#fff;box-shadow:0 0 8px rgba(255,255,255,.95)}

.header{
  position:absolute;z-index:10;left:0;right:0;top:0;height:13.5vh;
  display:flex;flex-direction:column;align-items:center;padding-top:.35vh;text-align:center;
}
.kicker{color:var(--gold);font-size:min(.95vw,1.7vh);letter-spacing:.16em;font-weight:800}
h1{
  margin:0;font-family:Teko,Impact,sans-serif;font-size:min(4.35vw,7.9vh);line-height:.86;
  letter-spacing:.04em;text-transform:uppercase;
  background:linear-gradient(#fff,#becbd6);-webkit-background-clip:text;-webkit-text-fill-color:transparent;
}
.subtitle{color:var(--cyan);font-size:min(1vw,1.75vh);font-weight:800}
.live{
  display:flex;align-items:center;gap:.5em;margin-top:.28vh;padding:.35vh .8vw;
  border:2px solid #ff3030;border-radius:12px;background:#190608;color:#fff;
  font-size:min(.84vw,1.45vh);font-weight:800;
}
.live i{width:.7em;height:.7em;border-radius:50%;background:red;box-shadow:0 0 8px red;animation:blink 1.1s ease-in-out infinite}
@keyframes blink{50%{opacity:.3}}

.main{
  position:absolute;z-index:5;left:1.8vw;right:1.8vw;top:14.2vh;bottom:1.7vh;
  display:grid;grid-template-columns:2.65fr 1.05fr;gap:.9vw;
}
.left-panel,.right-panel{
  min-width:0;min-height:0;
}
.left-panel{
  display:grid;grid-template-rows:auto 1fr auto;gap:.65vh;
}
.section-head{
  display:flex;align-items:end;justify-content:space-between;gap:1vw;
}
.section-title{
  font-family:Teko,Impact,sans-serif;font-size:min(2.35vw,4.1vh);line-height:.9;color:#fff;
}
.section-sub{color:var(--cyan);font-size:min(.95vw,1.65vh);font-weight:800}
.page-control{display:flex;align-items:center;gap:.5vw}
.page-label{color:var(--muted);font-size:min(.85vw,1.45vh);font-weight:700}
.nav-btn{
  width:2.1vw;min-width:30px;aspect-ratio:1;border-radius:50%;
  border:1px solid rgba(34,231,255,.28);background:rgba(10,40,60,.9);color:#fff;
  font-size:min(1.25vw,2.1vh);font-weight:800;cursor:pointer;
}
.nav-btn:hover{background:rgba(17,125,168,.75)}

.standings-page{
  min-width:0;min-height:0;
  display:grid;grid-template-rows:repeat(2,minmax(0,1fr));gap:.9vh;
}
.group-table{
  min-width:0;min-height:0;overflow:hidden;border:1.7px solid var(--blue);border-radius:14px;
  background:linear-gradient(180deg,rgba(12,43,66,.97),rgba(5,18,30,.99));
  box-shadow:inset 0 0 0 1px rgba(34,231,255,.14);
}
.group-title{
  height:14%;display:flex;align-items:center;padding:0 .9vw;
  font-size:min(1.35vw,2.3vh);font-weight:800;color:var(--cyan);
  background:linear-gradient(180deg,#103653,#09263a);
}
.table{
  height:86%;display:grid;grid-template-rows:auto repeat(4,minmax(0,1fr));padding:.35vh .55vw .45vh;
}
.th,.tr{
  display:grid;
  grid-template-columns:5% minmax(0,1fr) 6% 6% 6% 6% 6% 6% 7% 7% 25%;
  align-items:center;column-gap:.15vw;
}
.th{
  color:var(--muted);font-size:min(.82vw,1.4vh);font-weight:700;border-bottom:1px solid rgba(255,255,255,.14);
}
.tr{
  color:#fff;font-size:min(1vw,1.72vh);font-weight:700;border-bottom:1px solid rgba(255,255,255,.09);
}
.tr:last-child{border-bottom:none}
.pos,.num,.pts{text-align:center}
.pts{font-weight:800}
.team-cell{min-width:0;display:flex;align-items:center;gap:.38vw}
.flag{
  width:1.55vw;min-width:19px;max-width:27px;aspect-ratio:1.45/1;border-radius:2px;overflow:hidden;flex:0 0 auto;
}
.flag img{width:100%;height:100%;object-fit:cover;display:block}
.team-name{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.form{display:flex;align-items:center;gap:.2vw;justify-content:flex-start}
.form-dot{
  width:.9vw;min-width:12px;max-width:16px;aspect-ratio:1;border-radius:50%;
  display:flex;align-items:center;justify-content:center;border:2px solid rgba(255,255,255,.45);
  color:#fff;font-size:min(.55vw,.95vh);font-weight:900;
}
.form-dot.W{background:#24a65a;border-color:#5de18b}
.form-dot.D{background:#7b8190;border-color:#aeb4c1}
.form-dot.L{background:#d93434;border-color:#ff7777}
.form-dot.empty{background:transparent}
.page-dots{display:flex;justify-content:center;gap:7px}
.page-dots span{width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,.25)}
.page-dots span.active{background:var(--cyan);box-shadow:0 0 8px rgba(34,231,255,.75)}

.right-panel{
  display:grid;grid-template-rows:1fr 1fr;gap:.9vh;
}
.panel{
  min-width:0;min-height:0;overflow:hidden;border:1.7px solid var(--blue);border-radius:15px;
  background:linear-gradient(180deg,rgba(9,31,48,.97),rgba(5,17,28,.99));
  box-shadow:inset 0 0 0 1px rgba(34,231,255,.12);
}
.panel-head{padding:.85vh .8vw .4vh}
.panel-title{font-family:Teko,Impact,sans-serif;font-size:min(2.15vw,3.8vh);line-height:.9;color:#fff}
.panel-sub{color:var(--cyan);font-size:min(.92vw,1.58vh);font-weight:800}
.schedule-list{
  height:calc(100% - 5.5vh);padding:0 .7vw .7vh;display:grid;grid-template-rows:repeat(4,minmax(0,1fr));gap:.5vh;
}
.match-card{
  min-height:0;overflow:hidden;border:1px solid rgba(34,231,255,.2);border-radius:10px;
  background:linear-gradient(180deg,rgba(13,43,65,.92),rgba(6,21,34,.96));
  padding:.5vh .6vw;display:grid;grid-template-rows:auto 1fr auto;
}
.match-top{display:flex;justify-content:space-between}
.date{color:var(--gold);font-size:min(.9vw,1.55vh);font-weight:800}
.time{color:#fff;font-size:min(.98vw,1.68vh);font-weight:800}
.side{display:flex;align-items:center;gap:.35vw;min-width:0;color:#fff;font-size:min(1vw,1.72vh);font-weight:700}
.side+.side{margin-top:.1vh}
.mini{width:1.18vw;min-width:15px;max-width:22px;aspect-ratio:1.45/1;border-radius:2px;overflow:hidden;flex:0 0 auto}
.mini img{width:100%;height:100%;object-fit:cover}
.tname{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.meta{display:flex;justify-content:space-between;gap:.4vw;color:var(--cyan2);font-size:min(.76vw,1.3vh);font-weight:700}
.venue{min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--muted)}
.no-games{height:100%;display:flex;align-items:center;justify-content:center;text-align:center;color:var(--muted);font-size:min(1.25vw,2.15vh);font-weight:800;padding:1vw}

.leaders-header{
  display:flex;align-items:center;justify-content:space-between;padding:.75vh .8vw .2vh;
}
.leader-nav{
  width:2.05vw;min-width:30px;aspect-ratio:1;border-radius:50%;
  border:none;background:rgba(255,255,255,.08);color:#fff;font-size:min(1.2vw,2vh);cursor:pointer;
}
.leader-tabs{
  display:grid;grid-template-columns:repeat(4,1fr);gap:.25vw;padding:0 .65vw .45vh;
  border-bottom:1px solid rgba(255,255,255,.12);
}
.tab{
  position:relative;text-align:center;padding:.45vh .2vw;color:var(--muted);
  font-size:min(.88vw,1.5vh);font-weight:700;cursor:pointer;
}
.tab.active{color:#fff}
.tab.active:after{
  content:"";position:absolute;left:0;right:0;bottom:-.45vh;height:2px;background:#2d7dff;
}
.leader-cols{
  display:grid;grid-template-columns:minmax(0,1fr) 18%;padding:.45vh .85vw .25vh;
  color:var(--muted);font-size:min(.78vw,1.35vh);border-bottom:1px solid rgba(255,255,255,.1);
}
.leader-cols span:last-child{text-align:center}
.leader-list{padding:0 .8vw}
.leader-item{
  display:grid;grid-template-columns:8% 13% minmax(0,1fr) 15%;
  align-items:center;gap:.35vw;padding:.65vh 0;border-bottom:1px solid rgba(255,255,255,.08);
}
.leader-item:last-child{border-bottom:none}
.lrank{text-align:center;color:#fff;font-size:min(.95vw,1.62vh)}
.avatar{
  width:2.3vw;min-width:31px;max-width:40px;aspect-ratio:1;border-radius:50%;
  display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#2d3d55,#0c1520);
  border:2px solid rgba(255,255,255,.2);font-size:min(.8vw,1.4vh);font-weight:800;
}
.lname{min-width:0;display:flex;flex-direction:column;line-height:1.02}
.lname strong{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-size:min(1vw,1.72vh)}
.lname span{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--cyan2);font-size:min(.78vw,1.35vh)}
.lval{text-align:center;font-size:min(1.05vw,1.8vh);font-weight:800}

@media(max-aspect-ratio:16/9){.screen{height:calc(100vw*9/16)}}
</style>
</head>
<body>
<div class="screen">
  <div class="scan"></div>

  <div class="lights left">
    <span></span><span></span><span></span><span></span>
    <span></span><span></span><span></span><span></span>
    <span></span><span></span><span></span><span></span>
  </div>
  <div class="lights right">
    <span></span><span></span><span></span><span></span>
    <span></span><span></span><span></span><span></span>
    <span></span><span></span><span></span><span></span>
  </div>

  <header class="header">
    <div class="kicker">TOURNAMENT HUB</div>
    <h1>WORLD CUP 2026</h1>
    <div class="subtitle">Full Standings • Today’s Matches • Stat Leaders</div>
    <div class="live"><i></i>LIVE UPDATES</div>
  </header>

  <div class="main">
    <section class="left-panel">
      <div class="section-head">
        <div>
          <div class="section-title">GROUP STANDINGS</div>
          <div class="section-sub">Full table data with form</div>
        </div>
        <div class="page-control">
          <span id="standingsPageLabel" class="page-label">Groups A–B</span>
          <button id="standingsNext" class="nav-btn">›</button>
        </div>
      </div>
      <div id="standingsPage" class="standings-page"></div>
      <div id="standingsDots" class="page-dots"></div>
    </section>

    <aside class="right-panel">
      <section class="panel">
        <div class="panel-head">
          <div class="panel-title">TODAY'S MATCHES</div>
          <div class="panel-sub">Eastern Time only</div>
        </div>
        <div id="scheduleList" class="schedule-list"></div>
      </section>

      <section class="panel">
        <div class="leaders-header">
          <div>
            <div class="panel-title">STAT LEADERS</div>
            <div class="panel-sub">Tournament leaders</div>
          </div>
          <button id="leaderNext" class="leader-nav">›</button>
        </div>
        <div id="leaderTabs" class="leader-tabs"></div>
        <div class="leader-cols"><span>Player</span><span id="leaderValueLabel">Goals</span></div>
        <div id="leaderList" class="leader-list"></div>
      </section>
    </aside>
  </div>
</div>

<script>
const leaderDefs=[
  {key:"goals",label:"Goals"},
  {key:"assists",label:"Assists"},
  {key:"yellowCards",label:"Yellow cards"},
  {key:"redCards",label:"Red cards"}
];
let appData=null;
let standingsPageIndex=0;
let leaderIndex=0;
let standingsTimer=null;
let leaderTimer=null;

function flagUrl(code){
  const special={
    eng:"https://upload.wikimedia.org/wikipedia/en/b/be/Flag_of_England.svg",
    sct:"https://upload.wikimedia.org/wikipedia/commons/1/10/Flag_of_Scotland.svg"
  };
  return special[code]||`https://flagcdn.com/w40/${code}.png`;
}
function easternDateKey(date){
  return new Intl.DateTimeFormat("en-CA",{
    timeZone:"America/New_York",year:"numeric",month:"2-digit",day:"2-digit"
  }).format(date);
}
function sortedTeams(ts){
  return [...ts].sort((a,b)=>b.pts-a.pts||((b.gf-b.ga)-(a.gf-a.ga))||b.gf-a.gf||a.team.localeCompare(b.team));
}
function formHtml(form){
  const values=(form||[]).slice(-5);
  const padded=[...values];
  while(padded.length<5)padded.push("");
  return padded.map(v=>`<span class="form-dot ${v||"empty"}">${v||""}</span>`).join("");
}
function groupTable(letter,teams){
  const list=sortedTeams(teams);
  return `
    <section class="group-table">
      <div class="group-title">GROUP ${letter}</div>
      <div class="table">
        <div class="th">
          <span></span><span>Team</span><span>MP</span><span>W</span><span>D</span><span>L</span>
          <span>GF</span><span>GA</span><span>GD</span><span>Pts</span><span>Last 5</span>
        </div>
        ${list.map((t,i)=>`
          <div class="tr">
            <span class="pos">${i+1}</span>
            <span class="team-cell">
              <span class="flag"><img src="${flagUrl(t.flag)}" alt=""></span>
              <span class="team-name">${t.team}</span>
            </span>
            <span class="num">${t.p}</span>
            <span class="num">${t.w}</span>
            <span class="num">${t.d}</span>
            <span class="num">${t.l}</span>
            <span class="num">${t.gf}</span>
            <span class="num">${t.ga}</span>
            <span class="num">${t.gf-t.ga}</span>
            <span class="pts">${t.pts}</span>
            <span class="form">${formHtml(t.form)}</span>
          </div>
        `).join("")}
      </div>
    </section>`;
}
function renderStandings(){
  const letters=Object.keys(appData.groups);
  const pages=Math.ceil(letters.length/2);
  standingsPageIndex%=pages;
  const slice=letters.slice(standingsPageIndex*2,standingsPageIndex*2+2);
  document.getElementById("standingsPage").innerHTML=
    slice.map(letter=>groupTable(letter,appData.groups[letter])).join("");

  document.getElementById("standingsPageLabel").textContent=
    slice.length===2?`Groups ${slice[0]}–${slice[1]}`:`Group ${slice[0]}`;

  const dots=document.getElementById("standingsDots");
  dots.innerHTML="";
  for(let i=0;i<pages;i++){
    const d=document.createElement("span");
    if(i===standingsPageIndex)d.className="active";
    dots.appendChild(d);
  }
}
function nextStandings(){
  standingsPageIndex=(standingsPageIndex+1)%Math.ceil(Object.keys(appData.groups).length/2);
  renderStandings();
}
function renderSchedule(){
  const list=document.getElementById("scheduleList");
  list.innerHTML="";
  const today=easternDateKey(new Date());
  const games=(appData.games||[]).filter(g=>easternDateKey(new Date(g.kickoff))===today).slice(0,4);

  if(!games.length){
    list.innerHTML='<div class="no-games">NO GAMES SCHEDULED TODAY</div>';
    return;
  }
  games.forEach(g=>{
    const dt=new Date(g.kickoff);
    const date=dt.toLocaleDateString("en-US",{timeZone:"America/New_York",weekday:"short",month:"short",day:"numeric"});
    const time=dt.toLocaleTimeString("en-US",{timeZone:"America/New_York",hour:"numeric",minute:"2-digit",timeZoneName:"short"});
    const card=document.createElement("article");
    card.className="match-card";
    card.innerHTML=`
      <div class="match-top"><span class="date">${date}</span><span class="time">${time}</span></div>
      <div>
        <div class="side"><span class="mini"><img src="${flagUrl(g.homeFlag)}"></span><span class="tname">${g.home}</span></div>
        <div class="side"><span class="mini"><img src="${flagUrl(g.awayFlag)}"></span><span class="tname">${g.away}</span></div>
      </div>
      <div class="meta"><span>Group ${g.group||"-"}</span><span class="venue">${g.venue||""}</span></div>`;
    list.appendChild(card);
  });
}
function initials(name){
  return (name||"?").split(/\s+/).map(x=>x[0]).join("").slice(0,2).toUpperCase();
}
function renderLeaderTabs(){
  const tabs=document.getElementById("leaderTabs");
  tabs.innerHTML="";
  leaderDefs.forEach((d,i)=>{
    const tab=document.createElement("div");
    tab.className="tab"+(i===leaderIndex?" active":"");
    tab.textContent=d.label;
    tab.onclick=()=>{leaderIndex=i;renderLeaders();restartLeaderTimer()};
    tabs.appendChild(tab);
  });
}
function renderLeaders(){
  renderLeaderTabs();
  const def=leaderDefs[leaderIndex];
  document.getElementById("leaderValueLabel").textContent=def.label;
  const items=(appData.leaders?.[def.key]||[]).slice(0,5);
  const fallback=[{name:"Stats updating",team:"FIFA",value:"--"}];
  const list=document.getElementById("leaderList");
  list.innerHTML="";
  (items.length?items:fallback).forEach((item,i)=>{
    const row=document.createElement("div");
    row.className="leader-item";
    row.innerHTML=`
      <div class="lrank">${i+1}</div>
      <div class="avatar">${initials(item.name)}</div>
      <div class="lname"><strong>${item.name}</strong><span>${item.team||"FIFA"}</span></div>
      <div class="lval">${item.value??"--"}</div>`;
    list.appendChild(row);
  });
}
function nextLeader(){
  leaderIndex=(leaderIndex+1)%leaderDefs.length;
  renderLeaders();
}
function restartStandingsTimer(){
  clearInterval(standingsTimer);
  standingsTimer=setInterval(nextStandings,10000);
}
function restartLeaderTimer(){
  clearInterval(leaderTimer);
  leaderTimer=setInterval(nextLeader,7000);
}
function render(data){
  appData=data;
  standingsPageIndex=0;
  leaderIndex=0;
  renderStandings();
  renderSchedule();
  renderLeaders();
  restartStandingsTimer();
  restartLeaderTimer();
}
document.getElementById("standingsNext").onclick=()=>{nextStandings();restartStandingsTimer()};
document.getElementById("leaderNext").onclick=()=>{nextLeader();restartLeaderTimer()};

async function load(){
  try{
    const r=await fetch(`data.json?t=${Date.now()}`,{cache:"no-store"});
    if(!r.ok)throw new Error(r.status);
    render(await r.json());
  }catch(e){
    console.error(e);
  }
}
load();
setInterval(load,60000);
</script>
</body>
</html>
